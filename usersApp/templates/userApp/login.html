{% extends 'base.html' %}
{% block title %}Sign In | StyleHaven{% endblock %}

{% block content %}
<div class="min-h-[82vh] flex items-center justify-center px-4" style="background:linear-gradient(135deg,#F8F8FC 0%,#EEF2FF 100%);">
    <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-xl border border-indigo-50">

        <!-- Tab Switch -->
        <div class="flex bg-slate-100 p-1 rounded-xl mb-8">
            <button onclick="switchTab('user')" id="btn-user"
                    class="flex-1 py-2.5 text-sm font-semibold rounded-lg bg-white shadow-sm text-indigo-600 transition">
                Customer
            </button>
            <button onclick="switchTab('admin')" id="btn-admin"
                    class="flex-1 py-2.5 text-sm font-semibold rounded-lg text-slate-400 transition">
                Admin / Manager
            </button>
        </div>

        <h2 class="text-3xl font-bold text-center text-indigo-900 mb-1" style="font-family:'Poppins',sans-serif;">Welcome Back</h2>
        <p class="text-center text-slate-400 text-sm mb-8">Access your personalized haven.</p>

        {% if error %}
        <div class="bg-red-50 text-red-500 text-xs font-semibold p-3 rounded-xl mb-4 text-center border border-red-100">
            <i class="fas fa-exclamation-circle mr-1"></i>{{ error }}
        </div>
        {% endif %}

        <!-- Customer (OTP) Form -->
        <form method="POST" id="form-user" class="flex flex-col gap-4">
            {% csrf_token %}
            <input type="hidden" name="login_type" value="user">

            <div>
                <label class="text-xs font-bold uppercase text-slate-400 tracking-widest mb-1.5 block">Email Address</label>
                <input type="email" name="email" required placeholder="name@example.com"
                       class="w-full bg-slate-50 border border-slate-200 px-4 py-3 rounded-xl text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition">
            </div>

            <button type="submit" class="btn-primary w-full mt-1">Send OTP</button>
        </form>

        <!-- Admin (Password) Form -->
        <form method="POST" id="form-admin" class="hidden flex-col gap-4">
            {% csrf_token %}
            <input type="hidden" name="login_type" value="admin">

            <div>
                <label class="text-xs font-bold uppercase text-slate-400 tracking-widest mb-1.5 block">Username</label>
                <input type="text" name="username" placeholder="admin"
                       class="w-full bg-slate-50 border border-slate-200 px-4 py-3 rounded-xl text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition">
            </div>
            <div>
                <label class="text-xs font-bold uppercase text-slate-400 tracking-widest mb-1.5 block">Password</label>
                <input type="password" name="password" placeholder="••••••"
                       class="w-full bg-slate-50 border border-slate-200 px-4 py-3 rounded-xl text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition">
            </div>

            <button type="submit"
                    class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl shadow-md hover:bg-slate-900 transition uppercase tracking-widest text-xs mt-1">
                Manager Login
            </button>
        </form>

        <div class="mt-7 text-center">
            <p class="text-slate-400 text-xs">
                No account yet?
                <a href="{% url 'register' %}" class="text-indigo-600 font-bold hover:underline">Register Here</a>
            </p>
        </div>
    </div>
</div>

<script>
    function switchTab(type) {
        const userForm  = document.getElementById('form-user');
        const adminForm = document.getElementById('form-admin');
        const btnUser   = document.getElementById('btn-user');
        const btnAdmin  = document.getElementById('btn-admin');

        if (type === 'user') {
            userForm.classList.remove('hidden'); userForm.classList.add('flex');
            adminForm.classList.add('hidden');   adminForm.classList.remove('flex');
            btnUser.classList.add('bg-white', 'shadow-sm', 'text-indigo-600');
            btnUser.classList.remove('text-slate-400');
            btnAdmin.classList.remove('bg-white', 'shadow-sm', 'text-indigo-600');
            btnAdmin.classList.add('text-slate-400');
        } else {
            adminForm.classList.remove('hidden'); adminForm.classList.add('flex');
            userForm.classList.add('hidden');     userForm.classList.remove('flex');
            btnAdmin.classList.add('bg-white', 'shadow-sm', 'text-indigo-600');
            btnAdmin.classList.remove('text-slate-400');
            btnUser.classList.remove('bg-white', 'shadow-sm', 'text-indigo-600');
            btnUser.classList.add('text-slate-400');
        }
    }
</script>
{% endblock %}
